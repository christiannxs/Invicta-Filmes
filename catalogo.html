<div class="hero">
  <div>
    <span class="sec-label" data-s="catalog_label">Portfólio completo</span>

<div class="filter-bar" id="filter-bar">

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Player de vídeo">
  <div class="lb-inner">
    <button class="lb-close" id="lb-close" aria-label="Fechar vídeo">✕</button>
