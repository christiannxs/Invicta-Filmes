<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produções — Invicta Filmes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/catalogo.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">INVICTA<span>.</span></a>
  <a href="index.html" class="nav-back">← Voltar</a>
</nav>

<div class="hero">
  <div>
    <span class="sec-label">Portfólio completo</span>
    <h1 class="hero-title">NOSSAS<br>PRODUÇÕES</h1>
  </div>
  <p class="hero-sub">Clipes, DVDs, campanhas institucionais e muito mais. Clique em qualquer vídeo para assistir.</p>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-cat="todos" onclick="filter(this)">Todos</button>
  <button class="filter-btn" data-cat="Clipe musical" onclick="filter(this)">Clipes</button>
  <button class="filter-btn" data-cat="DVD / Show" onclick="filter(this)">DVD / Show</button>
  <button class="filter-btn" data-cat="Institucional" onclick="filter(this)">Institucional</button>
  <button class="filter-btn" data-cat="Documentário" onclick="filter(this)">Documentário</button>
  <button class="filter-btn" data-cat="Publicitário" onclick="filter(this)">Publicitário</button>
  <button class="filter-btn" data-cat="Social media" onclick="filter(this)">Social media</button>
</div>

<div class="catalog-wrap">
  <p class="count-label" id="count-label"></p>
  <div class="catalog-grid" id="catalog-grid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <iframe id="lb-frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div class="lb-label" id="lb-label"></div>
</div>

<button class="fab" onclick="toggleEdit()">✎ Editar catálogo</button>

<div class="edit-panel" id="edit-panel">
  <h3>Gerenciar produções</h3>
  <p style="font-size:0.75rem;color:var(--muted);margin-bottom:0.5rem;">Cole o ID do YouTube (parte após ?v= na URL)</p>
  <div id="ep-items"></div>
  <button class="ep-add" onclick="addItem()">+ Adicionar produção</button>
  <div class="edit-actions">
    <button class="btn-save" onclick="saveAll()">Salvar</button>
    <button class="btn-cancel" onclick="toggleEdit()">Cancelar</button>
  </div>
</div>

<script src="js/catalogo.js"></script>
</body>
</html>
