<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produções — Invicta Filmes</title>
<link rel="icon" href="assets/invicta-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/catalogo.css">
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><img src="assets/invicta-logo.png" alt="Invicta Filmes"></a>
  <a href="/" class="nav-back">← Voltar</a>
</nav>

<div class="hero">
  <div>
    <span class="sec-label" data-s="catalog_label">Portfólio completo</span>
    <h1 class="hero-title" data-s="catalog_title">NOSSAS<br>PRODUÇÕES</h1>
  </div>
  <p class="hero-sub" data-s="catalog_sub">Clipes, DVDs, campanhas institucionais e muito mais. Clique em qualquer vídeo para assistir.</p>
</div>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-cat="todos" onclick="filter(this)">Todos</button>
  <button class="filter-btn" data-cat="Clipe musical" onclick="filter(this)">Clipes</button>
  <button class="filter-btn" data-cat="DVD / Show" onclick="filter(this)">DVD / Show</button>
  <button class="filter-btn" data-cat="Institucional" onclick="filter(this)">Institucional</button>
  <button class="filter-btn" data-cat="Documentário" onclick="filter(this)">Documentário</button>
  <button class="filter-btn" data-cat="Publicitário" onclick="filter(this)">Publicitário</button>
  <button class="filter-btn" data-cat="Social media" onclick="filter(this)">Social media</button>
</div>

<div class="catalog-wrap">
  <p class="count-label" id="count-label"></p>
  <div class="catalog-grid" id="catalog-grid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Player de vídeo">
  <div class="lb-inner">
    <button class="lb-close" id="lb-close" aria-label="Fechar vídeo">✕</button>
    <iframe id="lb-frame" title="Player de vídeo do YouTube" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div class="lb-label" id="lb-label"></div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/catalogo.js"></script>
</body>
</html>
